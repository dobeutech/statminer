# Datadog CI Visibility — Auto-generated by Dobeu Automation Architect
# Reports GitHub Actions pipeline data to Datadog for CI Visibility
# Required: DD_API_KEY must be set as a GitHub Organization/Repository secret

name: Datadog CI Visibility

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  workflow_dispatch:

jobs:
  datadog-ci-report:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Datadog CI
        run: npm install -g @datadog/datadog-ci

      - name: Tag CI Pipeline
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_ENV: ci
          DD_SERVICE: ${{ github.event.repository.name }}
          DD_SITE: datadoghq.com
          DD_GIT_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          DD_GIT_COMMIT_SHA: ${{ github.sha }}
          DD_GIT_BRANCH: ${{ github.ref_name }}
        run: |
          echo "Datadog CI Visibility active for ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          datadog-ci tag --level pipeline --tags env:ci,service:${{ github.event.repository.name }},team:dobeutech
